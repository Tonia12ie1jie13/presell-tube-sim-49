<body>
    <div class="header">
        <span id="viewer-count">XXX</span> Pessoas estão assistindo a esse vídeo
    </div>
    
    <div class="container">
        <div class="info-box">
            Devido a alta demanda de acessos, garantimos a apresentação somente até: 
            <span id="current-date" class="date-highlight">xx/xx/xxxx</span>
        </div>
        
        <div class="video-container">
            <vturb-smartplayer id="vid-690c941febc6d4000fef8d33" style="display: block; margin: 0 auto; width: 100%; max-width: 400px;"></vturb-smartplayer>
        </div>
        
        <div class="audio-notice">
            🔊 Por favor, verifique se o som está ligado.
        </div>
    </div>
    
    <script>
        // Gerar número aleatório entre 600 e 1200 para o contador de pessoas
        function getRandomViewerCount() {
            return Math.floor(Math.random() * (1200 - 600 + 1)) + 600;
        }
        
        // Formatar data atual no formato dd/mm/aaaa
        function getCurrentDate() {
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = today.getFullYear();
            return `${day}/${month}/${year}`;
        }
        
        // Atualizar elementos com os valores gerados
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('viewer-count').textContent = getRandomViewerCount();
            document.getElementById('current-date').textContent = getCurrentDate();
        });
        
        // Carregar script do player do vturb
        var s = document.createElement("script");
        s.src = "https://scripts.converteai.net/cd566ce3-465c-43ca-a1b3-906fb328493e/players/690c941febc6d4000fef8d33/v4/player.js";
        s.async = true;
        document.head.appendChild(s);
    </script>
